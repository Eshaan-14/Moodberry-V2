
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <title>Moodberry | Express Your Vibe</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet" crossorigin="anonymous">
  <style>
    :root {
      --bg-dark: #0f172a; /* Slate 900 - Dark Blueberry */
      --bg-light: #0f172a; /* Force Dark Mode */
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
      background-size: 50px 50px;
      color: #e0f2fe;
      overflow-x: hidden;
    }
    .serif {
      font-family: 'Instrument Serif', serif;
    }
    /* Grain Overlay */
    .grain::after {
      content: "";
      position: fixed;
      top: -150%;
      left: -150%;
      width: 300%;
      height: 300%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3%3Ffilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/feTurbulence%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
      z-index: 9999;
      animation: noise 8s steps(10) infinite;
    }
    html.dark .grain::after {
      opacity: 0.05;
    }
    @keyframes noise {
      0% { transform: translate(0,0); }
      10% { transform: translate(-5%,-5%); }
      20% { transform: translate(-10%,5%); }
      30% { transform: translate(5%,-10%); }
      40% { transform: translate(-5%,15%); }
      50% { transform: translate(-10%,5%); }
      60% { transform: translate(15%,0); }
      70% { transform: translate(0,10%); }
      80% { transform: translate(-15%,0); }
      90% { transform: translate(10%,5%); }
      100% { transform: translate(5%,0); }
    }
    
    .fade-in {
      animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
<script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "html-to-image": "https://esm.sh/html-to-image@1.11.11",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
</head>
<body class="grain">
  <div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
